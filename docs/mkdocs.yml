      - Pipeline Commands: help/ai_pipeline_commands.md
      - Workspace: help/workspace.md
      - Methodology: help/methodology.md
  - Lifecycle: lifecycle.md
  - Configuration: configuration.md
  - AI Instructions:
      - Overview: ai-instructions/index.md
      - Commands: ai-instructions/commands/index.md
      - Skills: ai-instructions/skills/index.md
  - Design:
      - Process: design/system-design-process.md
      - Use-Case Mapping: design/use-case-mapping.md
      - Business Events: design/business-events.md
      - App Layering: design/business-app-layering.md
  - Changes: changes.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
