<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 560" role="img" aria-label="AI-MDE parts diagram">
  <style>
    .bg     { fill:#020617 }
    .box    { fill:#0f172a; stroke:#334155; stroke-width:2 }
    .ai     { fill:#0f172a; stroke:#38bdf8; stroke-width:2 }
    .dash   { fill:none;    stroke:#334155; stroke-width:1.5; stroke-dasharray:6 3 }
    .arrow  { stroke:#38bdf8; stroke-width:2.5; fill:none; marker-end:url(#ma) }
    .sarrow { stroke:#475569; stroke-width:1.5; fill:none; stroke-dasharray:4 3; marker-end:url(#mb) }
    .t      { font:600 14px Arial,sans-serif; fill:#e2e8f0 }
    .s      { font:400 11px Arial,sans-serif; fill:#94a3b8 }
    .hl     { font:500 11px Arial,sans-serif; fill:#38bdf8 }
    .dim    { font:400 11px Arial,sans-serif; fill:#475569 }
    .cap    { font:700 12px Arial,sans-serif; fill:#64748b; letter-spacing:1 }
  </style>
  <defs>
    <marker id="ma" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#38bdf8"/>
    </marker>
    <marker id="mb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#475569"/>
    </marker>
  </defs>

  <rect class="bg" width="1060" height="560"/>

  <!-- ── ai-mde container ────────────────────────────── -->
  <rect class="dash" x="20" y="20" width="300" height="510" rx="14"/>
  <text class="cap" x="40" y="44">AI-MDE</text>

  <!-- Knowledgebase label -->
  <text class="dim" x="40" y="72">Knowledgebase</text>

  <!-- AI Instructions -->
  <rect class="box" x="40" y="80" width="260" height="80" rx="10"/>
  <text class="t"  x="170" y="104" text-anchor="middle">AI Instructions</text>
  <text class="s"  x="170" y="122" text-anchor="middle">ai-instructions/</text>
  <text class="s"  x="170" y="138" text-anchor="middle">orchestrator · commands · skills</text>

  <!-- Methodology -->
  <rect class="box" x="40" y="178" width="260" height="80" rx="10"/>
  <text class="t"  x="170" y="202" text-anchor="middle">Methodology &amp; SE Knowhow</text>
  <text class="s"  x="170" y="220" text-anchor="middle">methodology/ · architecture/ · schemas/</text>
  <text class="s"  x="170" y="236" text-anchor="middle">phase rules · layer rules · patterns</text>

  <!-- divider -->
  <line x1="40" y1="278" x2="300" y2="278" stroke="#1e293b" stroke-width="1"/>
  <text class="dim" x="40" y="300">Tools</text>

  <!-- Viewer -->
  <rect class="box" x="40" y="308" width="120" height="55" rx="10"/>
  <text class="t"  x="100" y="332" text-anchor="middle">Viewer</text>
  <text class="s"  x="100" y="350" text-anchor="middle">web/ · :4000</text>

  <!-- Scripts -->
  <rect class="box" x="178" y="308" width="122" height="55" rx="10"/>
  <text class="t"  x="239" y="332" text-anchor="middle">Scripts</text>
  <text class="s"  x="239" y="350" text-anchor="middle">setup · validate</text>

  <!-- MCP Server -->
  <rect class="box" x="40" y="388" width="260" height="55" rx="10"/>
  <text class="t"  x="170" y="412" text-anchor="middle">MCP Server  (optional)</text>
  <text class="s"  x="170" y="430" text-anchor="middle">orchestrator.py · skill_runner.py</text>

  <!-- ── AI Engine (centre) ────────────────────────── -->
  <rect class="ai" x="390" y="200" width="200" height="140" rx="14"/>
  <text style="font:600 28px Arial,sans-serif;fill:#e2e8f0" x="490" y="258" text-anchor="middle">🧠</text>
  <text class="t"  x="490" y="288" text-anchor="middle">AI Engine</text>
  <text class="s"  x="490" y="308" text-anchor="middle">Claude · Gemini · Codex</text>

  <!-- ── project container ──────────────────────────── -->
  <rect class="dash" x="650" y="20" width="390" height="510" rx="14"/>
  <text class="cap" x="670" y="44">YOUR PROJECT  —  git</text>

  <!-- BA -->
  <rect class="box" x="670" y="58" width="350" height="58" rx="10"/>
  <text class="t"  x="845" y="82" text-anchor="middle">ba/</text>
  <text class="s"  x="845" y="100" text-anchor="middle">requirements · use-cases · glossary · analysis</text>

  <!-- Design -->
  <rect class="box" x="670" y="132" width="350" height="58" rx="10"/>
  <text class="t"  x="845" y="156" text-anchor="middle">design/</text>
  <text class="s"  x="845" y="174" text-anchor="middle">architecture · LDM · modules · entities · SQL · UI</text>

  <!-- src -->
  <rect class="box" x="670" y="206" width="350" height="58" rx="10"/>
  <text class="t"  x="845" y="230" text-anchor="middle">src/</text>
  <text class="s"  x="845" y="248" text-anchor="middle">generated source code</text>

  <!-- tests -->
  <rect class="box" x="670" y="280" width="350" height="58" rx="10"/>
  <text class="t"  x="845" y="304" text-anchor="middle">tests/</text>
  <text class="s"  x="845" y="322" text-anchor="middle">test artifacts</text>

  <!-- docs -->
  <rect class="box" x="670" y="354" width="350" height="58" rx="10"/>
  <text class="t"  x="845" y="378" text-anchor="middle">docs/ · output/</text>
  <text class="s"  x="845" y="396" text-anchor="middle">diagrams · exports · validation reports</text>

  <!-- project state -->
  <rect class="box" x="670" y="428" width="350" height="58" rx="10"/>
  <text class="t"  x="845" y="452" text-anchor="middle">project/</text>
  <text class="s"  x="845" y="470" text-anchor="middle">phase state · questions · logs · change-requests</text>

  <!-- internal flow arrows -->
  <path class="arrow" d="M845 116 L845 132"/>
  <path class="arrow" d="M845 190 L845 206"/>
  <path class="arrow" d="M845 264 L845 280"/>
  <path class="arrow" d="M845 338 L845 354"/>
  <path class="arrow" d="M845 412 L845 428"/>

  <!-- ── cross arrows ──────────────────────────────── -->
  <!-- AI Instructions → AI -->
  <path class="arrow" d="M300 120 L390 248"/>
  <text class="hl" x="318" y="176">instructs</text>

  <!-- Methodology → AI -->
  <path class="arrow" d="M300 218 L390 268"/>
  <text class="hl" x="318" y="238">informs</text>

  <!-- AI → project -->
  <path class="arrow" d="M590 270 L670 270"/>
  <text class="hl" x="608" y="263">generates</text>

  <!-- Viewer → project -->
  <path class="sarrow" d="M160 363 L160 500 L650 500 L650 458"/>
  <text class="dim" x="370" y="516">reads · displays</text>

  <!-- Scripts → project -->
  <path class="sarrow" d="M239 363 L239 490 L650 490 L650 460"/>

  <!-- MCP → AI -->
  <path class="sarrow" d="M300 415 L490 415 L490 340"/>
  <text class="dim" x="358" y="410">orchestrates</text>

</svg>
